# ============================================================
# 股票监控数据刷新 Workflow
# ============================================================

name: Refresh Stock Data

on:
  schedule:
    # 修复：原版从 UTC 01:00（北京 09:00）开始，早于 A 股开盘时间 09:30
    # 交易时段：09:30~11:30、13:00~15:00（北京时间）
    # 对应 UTC：01:30~03:30、05:00~07:00

    # 上午盘：09:30~11:30（UTC 01:30~03:30），每 15 分钟一次
    - cron: '30,45 1 * * 1-5'
    - cron: '0,15,30 2 * * 1-5'
    - cron: '45 2 * * 1-5'
    - cron: '0,15,30 3 * * 1-5'

    # 下午盘：13:00~15:00（UTC 05:00~07:00），每 15 分钟一次
    - cron: '0,15,30,45 5 * * 1-5'
    - cron: '0,15,30,45 6 * * 1-5'

    # 收盘后最后一次：15:05（UTC 07:05），抓收盘数据
    - cron: '5 7 * * 1-5'

  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行（忽略交易日校验）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: refresh-stock-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build stock data
        run: python scripts/build_data.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          touch data/signals.json data/latest_run.json data/state.json index.html
          git add data/signals.json data/latest_run.json data/state.json index.html

          COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M CST')

          if git diff --cached --quiet; then
            echo "✅ 无变更，跳过提交"
          else
            git commit -m "data: update ${COMMIT_TIME}"
            git push
          fi

        continue-on-error: false
