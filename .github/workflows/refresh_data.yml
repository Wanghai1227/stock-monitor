# ============================================================
# 股票监控数据刷新 Workflow
# ============================================================

name: Refresh Stock Data

on:
  schedule:
  # 上午盘：09:30~11:30（UTC 01:30~03:30），每 15 分钟一次
  - cron: '30,45 1 * * 1-5'        # 01:30 / 01:45
  - cron: '0,15,30,45 2 * * 1-5'   # 02:00 / 02:15 / 02:30 / 02:45（合并原来两条）
  - cron: '0,15,30 3 * * 1-5'      # 03:00 / 03:15 / 03:30

  # 下午盘：13:00~15:00（UTC 05:00~07:00），每 15 分钟一次
  - cron: '0,15,30,45 5 * * 1-5'   # 05:00 / 05:15 / 05:30 / 05:45
  - cron: '0,15,30,45 6 * * 1-5'   # 06:00 / 06:15 / 06:30 / 06:45
  - cron: '0 7 * * 1-5'            # 07:00（修复：补上收盘整点）

  # 收盘后兜底
  - cron: '5 7 * * 1-5'            # 07:05，收盘后第一次稳定抓取
  - cron: '0 8 * * 1-5'            # 08:00（北京 16:00），数据源完全稳定后兜底

    

  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行（忽略交易日校验）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: refresh-stock-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build stock data
        run: python scripts/build_data.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          touch data/signals.json data/latest_run.json data/state.json index.html
          git add data/signals.json data/latest_run.json data/state.json index.html

          COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M CST')

          if git diff --cached --quiet; then
            echo "✅ 无变更，跳过提交"
          else
            git commit -m "data: update ${COMMIT_TIME}"
            git push
          fi

        continue-on-error: false
