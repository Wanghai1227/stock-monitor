# ============================================================
# 股票监控数据刷新 Workflow
# ============================================================

name: Refresh Stock Data

on:
  schedule:
    - cron: '*/15 1-7 * * 1-5'
    - cron: '5 7 * * 1-5'

  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行（忽略交易日校验）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: refresh-stock-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build stock data
        run: python scripts/build_data.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}

      # ── Step 5: 提交并推送数据 ────────────────────────────
      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 用 touch 预创建文件：文件已存在则不动，不存在则建空文件
          # 这样 git add 永远不会因"文件不存在"而报错
          touch data/signals.json data/latest_run.json data/state.json index.html
          git add data/signals.json data/latest_run.json data/state.json index.html

          COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M CST')

          if git diff --cached --quiet; then
            echo "✅ 无变更，跳过提交"
          else
            git commit -m "data: update ${COMMIT_TIME}"
            git push
          fi

        continue-on-error: false
